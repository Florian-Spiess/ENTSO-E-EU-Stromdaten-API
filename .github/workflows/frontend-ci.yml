name: Frontend CI

on:
  push:
    paths:
      - 'EU-Stromdaten Tool/prototype/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'EU-Stromdaten Tool/prototype/frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EU-Stromdaten Tool/prototype/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: EU-Stromdaten Tool/prototype/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'http://localhost:8000' }}
        run: npm run build
