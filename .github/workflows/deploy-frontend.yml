name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'EU-Stromdaten Tool/prototype/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EU-Stromdaten Tool/prototype/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: EU-Stromdaten Tool/prototype/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'https://your-backend.example.com' }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: EU-Stromdaten Tool/prototype/frontend/dist
